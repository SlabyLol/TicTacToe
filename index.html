<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tic Tac Toe</title>

<!-- ═══ PWA / Home Screen Icon ═══ -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="X / O">
<meta name="theme-color" content="#0a0a0f">
<!-- Apple touch icon (inline SVG → data URI so it works without extra file on iOS) -->
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
    --x-color: #e8614a; --x-glow: rgba(232,97,74,0.35);
    --o-color: #4ab3e8; --o-glow: rgba(74,179,232,0.35);
    --text: #f0f0f8; --muted: rgba(240,240,248,0.45);
    --accent: #c084fc; --radius: 16px; --cell-radius: 14px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(192,132,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(74,179,232,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(232,97,74,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .app { position: relative; width: min(420px, 94vw); z-index: 1; }

  /* top bar */
  .top-bar {
    position: fixed; top: max(14px, env(safe-area-inset-top)); right: 14px;
    display: flex; gap: 8px; z-index: 200;
  }
  .top-btn {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 10px; padding: 7px 12px;
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.2s; letter-spacing: 0.03em; white-space: nowrap;
  }
  .top-btn:hover { background: var(--surface2); }

  /* logo */
  .logo {
    text-align: center; margin-bottom: 2rem;
    letter-spacing: -0.03em;
    font-size: clamp(2rem, 8vw, 2.8rem); font-weight: 800;
  }
  .logo .x  { color: var(--x-color); }
  .logo .sep{ color: var(--muted); font-weight: 400; margin: 0 4px; }
  .logo .o  { color: var(--o-color); }

  .screen { display: none; }
  .screen.active { display: block; }

  /* menu */
  .menu-card {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 2rem;
  }
  .menu-title {
    font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted);
    margin-bottom: 1.25rem; font-family: 'DM Mono', monospace;
  }
  .mode-btn {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 1.1rem 1.4rem; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 14px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    margin-bottom: 0.75rem; text-align: left;
  }
  .mode-btn:last-child { margin-bottom: 0; }
  .mode-btn:hover { border-color: var(--border2); background: rgba(255,255,255,0.05); transform: translateY(-1px); }
  .mode-btn:active { transform: translateY(0); }
  .mode-btn .icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .mode-btn.bot .icon { background: rgba(192,132,252,0.15); }
  .mode-btn.pvp .icon { background: rgba(74,179,232,0.15); }
  .mode-btn sub { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* music strip */
  .music-strip {
    margin-top: 1rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 0.65rem 1rem;
    display: flex; align-items: center; gap: 10px;
    font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted);
  }
  .bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; flex-shrink: 0; }
  .bars span { width: 3px; border-radius: 2px; background: var(--accent); animation: barUp 0.7s ease-in-out infinite alternate; }
  .bars span:nth-child(1){animation-delay:0s}
  .bars span:nth-child(2){animation-delay:0.17s}
  .bars span:nth-child(3){animation-delay:0.34s}
  .bars span:nth-child(4){animation-delay:0.51s}
  @keyframes barUp { from{height:3px} to{height:14px} }
  .bars.stopped span { animation-play-state:paused; height:3px; }
  .track-name { flex: 1; }
  .play-pause { background:none; border:none; color:var(--text); font-size:16px; cursor:pointer; padding:2px 4px; border-radius:6px; transition:background 0.2s; }
  .play-pause:hover { background: var(--surface2); }

  /* game */
  .back-btn {
    background: none; border: none; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer;
    padding: 0 0 1.4rem 0; display: flex; align-items: center; gap: 6px;
    transition: color 0.2s; letter-spacing: 0.04em;
  }
  .back-btn:hover { color: var(--text); }

  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem;
  }
  .player-tag {
    font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 4px 12px; border-radius: 8px; opacity: 0.4;
    transition: opacity 0.3s, background 0.3s; font-weight: 500;
  }
  .player-tag.x { color: var(--x-color); }
  .player-tag.o { color: var(--o-color); }
  .player-tag.active { opacity: 1; }
  .player-tag.active.x { background: var(--x-glow); }
  .player-tag.active.o { background: var(--o-glow); }
  .score-display { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); letter-spacing: 0.06em; }
  .score-display span { color: var(--text); font-weight: 500; }

  .diff-row { display: flex; gap: 7px; margin-bottom: 1.1rem; }
  .diff-btn {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0.45rem 0.2rem;
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .diff-btn:hover { border-color: var(--border2); color: var(--text); }
  .diff-btn.active { background: rgba(192,132,252,0.15); border-color: var(--accent); color: var(--accent); }

  /* board */
  .board-wrap { position: relative; margin-bottom: 1.25rem; }
  .board {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 12px;
  }
  .cell {
    aspect-ratio: 1; border-radius: var(--cell-radius);
    background: var(--surface2); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: clamp(2rem,10vw,3rem); font-weight: 800;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    user-select: none;
  }
  .cell:hover:not(.taken):not(.locked) { background:rgba(255,255,255,0.06); border-color:var(--border2); transform:scale(1.03); }
  .cell.taken  { cursor: default; }
  .cell.locked { cursor: not-allowed; }
  .cell.x-cell { color: var(--x-color); }
  .cell.o-cell { color: var(--o-color); }
  .cell.pop { animation: pop .22s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { from{transform:scale(.55);opacity:.4} to{transform:scale(1);opacity:1} }
  .cell.win-cell { animation: wPulse .5s ease forwards; }
  @keyframes wPulse { 0%{transform:scale(1)} 40%{transform:scale(1.13)} 100%{transform:scale(1.08)} }
  .cell.x-cell.win-cell { background:var(--x-glow); border-color:var(--x-color); }
  .cell.o-cell.win-cell { background:var(--o-glow); border-color:var(--o-color); }

  /* result overlay */
  .result-overlay {
    position:absolute; inset:0; background:rgba(10,10,15,.88);
    border-radius:var(--radius); display:none; flex-direction:column;
    align-items:center; justify-content:center;
    gap:.6rem; z-index:10; backdrop-filter:blur(6px);
    animation:fadeIn .3s ease;
  }
  .result-overlay.show { display:flex; }
  @keyframes fadeIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .result-emoji { font-size:3.2rem; line-height:1; }
  .result-text  { font-size:1.55rem; font-weight:800; letter-spacing:-.02em; }
  .result-text.x-win { color:var(--x-color); }
  .result-text.o-win { color:var(--o-color); }
  .result-text.draw  { color:var(--muted); }

  .btn-row { display:flex; gap:10px; }
  .action-btn {
    flex:1; border-radius:12px; padding:.85rem;
    font-family:'Syne',sans-serif; font-size:.9rem; font-weight:700;
    cursor:pointer; transition:opacity .2s,transform .15s;
    border:1px solid var(--border2);
  }
  .action-btn:hover  { opacity:.85; transform:translateY(-1px); }
  .action-btn:active { transform:translateY(0); }
  .action-btn.primary   { background:var(--accent); color:#fff; border-color:transparent; }
  .action-btn.secondary { background:var(--surface2); color:var(--text); }

  .thinking {
    font-family:'DM Mono',monospace; font-size:12px; color:var(--muted);
    text-align:center; height:16px; margin-bottom:.75rem;
    letter-spacing:.06em; animation:blink 1.2s infinite;
  }
  @keyframes blink { 50%{opacity:.25} }
</style>
</head>
<body>

<div class="top-bar">
  <button class="top-btn" onclick="toggleMusic()"><span id="musicIcon">🎵</span><span id="musicLabel">Music On</span></button>
  <button class="top-btn" onclick="toggleSFX()"><span id="sfxIcon">🔊</span><span id="sfxLabel">SFX On</span></button>
</div>

<div class="app">
  <div class="logo"><span class="x">X</span><span class="sep">/</span><span class="o">O</span></div>

  <!-- MENU -->
  <div id="menu" class="screen active">
    <div class="menu-card">
      <div class="menu-title">Choose Game Mode</div>
      <button class="mode-btn bot" onclick="startGame('bot')">
        <div class="icon">🤖</div>
        <div>Play vs Bot<sub>Single player · AI opponent</sub></div>
      </button>
      <button class="mode-btn pvp" onclick="startGame('pvp')">
        <div class="icon">👥</div>
        <div>Player vs Player<sub>Two players · Local game</sub></div>
      </button>
    </div>
    <div class="music-strip">
      <div class="bars stopped" id="barsAnim"><span></span><span></span><span></span><span></span></div>
      <span class="track-name">♪ Wartime Jig | Music copyright by M.S. Stone</span>
      <button class="play-pause" id="ppBtn" onclick="toggleMusic()">▶</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" class="screen">
    <button class="back-btn" onclick="goMenu()">← Menu</button>
    <div id="diffRow" class="diff-row" style="display:none">
      <button class="diff-btn active" data-diff="superEasy" onclick="setDiff('superEasy')">Super Easy</button>
      <button class="diff-btn"        data-diff="easy"      onclick="setDiff('easy')">Easy</button>
      <button class="diff-btn"        data-diff="medium"    onclick="setDiff('medium')">Medium</button>
      <button class="diff-btn"        data-diff="hard"      onclick="setDiff('hard')">Hard</button>
    </div>
    <div class="status-bar">
      <div id="tagX" class="player-tag x active"><span id="nameX">You (X)</span></div>
      <div class="score-display"><span id="scoreX">0</span> – <span id="scoreO">0</span></div>
      <div id="tagO" class="player-tag o"><span id="nameO">Bot (O)</span></div>
    </div>
    <div id="thinking" class="thinking" style="display:none">Bot is thinking…</div>
    <div class="board-wrap">
      <div class="board">
        <div class="cell" onclick="handleClick(0)"></div>
        <div class="cell" onclick="handleClick(1)"></div>
        <div class="cell" onclick="handleClick(2)"></div>
        <div class="cell" onclick="handleClick(3)"></div>
        <div class="cell" onclick="handleClick(4)"></div>
        <div class="cell" onclick="handleClick(5)"></div>
        <div class="cell" onclick="handleClick(6)"></div>
        <div class="cell" onclick="handleClick(7)"></div>
        <div class="cell" onclick="handleClick(8)"></div>
      </div>
      <div class="result-overlay" id="resultOverlay">
        <div class="result-emoji" id="resultEmoji"></div>
        <div class="result-text"  id="resultText"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="action-btn secondary" onclick="goMenu()">← Menu</button>
      <button class="action-btn primary"   onclick="resetRound(true)">New Round ↺</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   AUDIO
   Background: menu.mp3 (place in same folder)
   SFX: Web Audio API (no extra files)
══════════════════════════════════════ */
const bgMusic = new Audio('menu.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;

let musicOn = true, sfxOn = true, musicStarted = false;

function tryStartMusic() {
  if (!musicOn || musicStarted) return;
  bgMusic.play().then(() => {
    musicStarted = true;
    setPlaying(true);
  }).catch(() => {});
}

function toggleMusic() {
  musicOn = !musicOn;
  if (musicOn) {
    bgMusic.play().then(() => { musicStarted = true; }).catch(() => {});
    setPlaying(true);
  } else {
    bgMusic.pause();
    setPlaying(false);
  }
  document.getElementById('musicIcon').textContent  = '🎵';
  document.getElementById('musicLabel').textContent = musicOn ? 'Music On' : 'Music Off';
}

function setPlaying(on) {
  const bars = document.getElementById('barsAnim');
  const pp   = document.getElementById('ppBtn');
  bars.classList.toggle('stopped', !on);
  pp.textContent = on ? '⏸' : '▶';
}

function toggleSFX() {
  sfxOn = !sfxOn;
  document.getElementById('sfxIcon').textContent  = sfxOn ? '🔊' : '🔇';
  document.getElementById('sfxLabel').textContent = sfxOn ? 'SFX On' : 'SFX Off';
}

/* Web Audio SFX */
let _actx = null;
function actx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}
function tone(f1, f2, dur, vol=0.16, wave='sine') {
  if (!sfxOn) return;
  try {
    const c=actx(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=wave;
    o.frequency.setValueAtTime(f1, c.currentTime);
    if(f2) o.frequency.exponentialRampToValueAtTime(f2, c.currentTime+dur*0.7);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dur);
    o.start(); o.stop(c.currentTime+dur);
  } catch(e){}
}
function chord(notes, gap=0.11, dur=0.3, vol=0.18, wave='sine') {
  notes.forEach((f,i) => setTimeout(()=>tone(f,null,dur,vol,wave), i*gap*1000));
}

const SFX = {
  click:    () => tone(520, 680, 0.10, 0.15, 'sine'),
  bot:      () => tone(340, 270, 0.13, 0.12, 'triangle'),
  menu:     () => tone(700, 920, 0.09, 0.12, 'sine'),
  win:      () => chord([523,659,784,1047], 0.11, 0.32, 0.2),
  lose:     () => chord([440,370,310,260],  0.13, 0.35, 0.11, 'sawtooth'),
  draw:     () => chord([440,440],          0.18, 0.28, 0.13),
  newRound: () => tone(620, 820, 0.09, 0.12, 'sine'),
};

/* ══════════════════════════════════════
   GAME
══════════════════════════════════════ */
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let mode='bot', diff='superEasy';
let board=Array(9).fill(''), turn='X', over=false, waiting=false;
let scores={X:0,O:0};

const cells = () => document.querySelectorAll('.cell');

function show(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(m) {
  SFX.menu(); tryStartMusic();
  mode=m; diff='superEasy'; scores={X:0,O:0};
  document.getElementById('diffRow').style.display = m==='bot'?'flex':'none';
  document.getElementById('nameX').textContent = m==='bot'?'You (X)':'Player X';
  document.getElementById('nameO').textContent = m==='bot'?'Bot (O)':'Player O';
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff==='superEasy'));
  updateScore(); show('game'); resetRound(false);
}

function goMenu() { SFX.menu(); waiting=false; show('menu'); }

function setDiff(d) {
  SFX.menu(); diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff===d));
  resetRound(false);
}

function resetRound(playSfx=true) {
  if(playSfx) SFX.newRound();
  board=Array(9).fill(''); turn='X'; over=false; waiting=false;
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('thinking').style.display='none';
  renderBoard(); indicator();
}

function renderBoard() {
  cells().forEach((c,i)=>{
    c.textContent=board[i]; c.className='cell';
    if(board[i]==='X') c.classList.add('x-cell','taken');
    if(board[i]==='O') c.classList.add('o-cell','taken');
    if(over) c.classList.add('locked');
  });
}

function handleClick(i) {
  if(over||board[i]||waiting) return;
  if(mode==='bot'&&turn==='O') return;
  SFX.click(); place(i,turn);
}

function place(i,p) {
  board[i]=p;
  const c=cells()[i];
  c.textContent=p;
  c.classList.add(p==='X'?'x-cell':'o-cell','taken','pop');
  setTimeout(()=>c.classList.remove('pop'),220);

  const win=checkWin(p);
  if(win){end(p,win);return;}
  if(board.every(v=>v)){end(null,null);return;}

  turn=turn==='X'?'O':'X'; indicator();

  if(mode==='bot'&&turn==='O'&&!over){
    waiting=true;
    document.getElementById('thinking').style.display='block';
    const delay={superEasy:260,easy:400,medium:560,hard:680}[diff]+Math.random()*280;
    setTimeout(()=>{
      if(over)return;
      document.getElementById('thinking').style.display='none';
      SFX.bot(); const mv=botMove(); waiting=false; place(mv,'O');
    },delay);
  }
}

function indicator() {
  document.getElementById('tagX').classList.toggle('active',turn==='X');
  document.getElementById('tagO').classList.toggle('active',turn==='O');
}

function checkWin(p) {
  return WINS.find(w=>w.every(i=>board[i]===p))||null;
}

function end(winner,combo) {
  over=true; waiting=false;
  document.getElementById('thinking').style.display='none';
  const ov=document.getElementById('resultOverlay');
  const em=document.getElementById('resultEmoji');
  const tx=document.getElementById('resultText');
  if(winner){
    scores[winner]++; updateScore();
    combo.forEach(i=>cells()[i].classList.add('win-cell'));
    if(mode==='bot'&&winner==='O'){
      SFX.lose(); em.textContent='🤖'; tx.textContent='Bot wins!'; tx.className='result-text o-win';
    } else {
      SFX.win();
      em.textContent = mode==='bot'?'🎉':'🏆';
      tx.textContent = mode==='bot'?'You win!':`Player ${winner} wins!`;
      tx.className   = `result-text ${winner.toLowerCase()}-win`;
    }
  } else {
    SFX.draw(); em.textContent='🤝'; tx.textContent="It's a draw!"; tx.className='result-text draw';
  }
  setTimeout(()=>ov.classList.add('show'),300);
}

function updateScore() {
  document.getElementById('scoreX').textContent=scores.X;
  document.getElementById('scoreO').textContent=scores.O;
}

/* BOT */
function botMove() {
  const empty=board.map((v,i)=>v===''?i:null).filter(i=>i!==null);
  if(diff==='superEasy') return empty[Math.floor(Math.random()*empty.length)];
  if(diff==='easy'){
    if(Math.random()<0.2){ const w=imm('O'); if(w!==-1)return w; }
    return empty[Math.floor(Math.random()*empty.length)];
  }
  if(diff==='medium'){
    const w=imm('O'); if(w!==-1)return w;
    const b=imm('X'); if(b!==-1)return b;
    if(Math.random()<0.45)return empty[Math.floor(Math.random()*empty.length)];
    return mm([...board],0,true).i;
  }
  return mm([...board],0,true).i;
}

function imm(p){
  const empty=board.map((v,i)=>v===''?i:null).filter(i=>i!==null);
  for(const i of empty){ const c=[...board]; c[i]=p; if(WINS.some(w=>w.every(j=>c[j]===p)))return i; }
  return -1;
}

function mm(b,d,max){
  if(WINS.some(w=>w.every(i=>b[i]==='O'))) return{s:10-d};
  if(WINS.some(w=>w.every(i=>b[i]==='X'))) return{s:d-10};
  const e=b.map((v,i)=>v===''?i:null).filter(i=>i!==null);
  if(!e.length) return{s:0};
  let best=max?{s:-Infinity}:{s:Infinity};
  for(const i of e){
    b[i]=max?'O':'X';
    const r=mm(b,d+1,!max); b[i]=''; r.i=i;
    if(max?r.s>best.s:r.s<best.s) best=r;
  }
  return best;
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
